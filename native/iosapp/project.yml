# xcodegen spec for the RoonSage iOS app.
# Regenerate the .xcodeproj after editing:  cd native/iosapp && xcodegen generate
# The app target reuses the shared SPM package at ../RoonSage (RoonSageUI +
# RoonSageCore); no app source is duplicated.
name: RoonSageiOS
options:
  bundleIdPrefix: com.roonsage
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  RoonSage:
    path: ../RoonSage

targets:
  RoonSageiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared          # ActivityAttributes shared with the widget extension
      - path: Assets.xcassets
    entitlements:
      path: RoonSageiOS.entitlements
      properties:
        # App Group: deelt de now-playing snapshot met de widget-extensie.
        com.apple.security.application-groups: [group.com.roonsage.ios]
    info:
      path: Sources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: RoonSage
        # iOS requires a local-network usage string to reach the Roon Core
        # (direct TCP to the saved host, incl. over ZeroTier).
        NSLocalNetworkUsageDescription: "RoonSage verbindt met je Roon Core op het lokale netwerk om je muziek te bedienen."
        UIApplicationSupportsIndirectInputEvents: YES
        # Live Activity (lock screen / Dynamic Island now-playing).
        NSSupportsLiveActivities: YES
        # Standard HTTPS-only encryption → exempt from US export compliance review.
        ITSAppUsesNonExemptEncryption: NO
        UILaunchScreen: {}
        # Background refresh for widget/zone state updates.
        UIBackgroundModes:
          - fetch
        # BGTaskScheduler task identifiers — must be here (Info.plist), not a build setting.
        BGTaskSchedulerPermittedIdentifiers:
          - com.roonsage.ios.refresh
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: RoonSage
        product: RoonSageUI
      - package: RoonSage
        product: RoonSageCore
      - target: RoonSageWidgets   # embeds the Live Activity extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roonsage.ios
        PRODUCT_NAME: RoonSage
        # Keep > the highest version already on TestFlight (1.6.1 was uploaded
        # once via a manual workflow_dispatch). CI overrides both values: the
        # version from the ios-v* tag, the build from `git rev-list --count`.
        MARKETING_VERSION: "1.6.2"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"          # iPhone + iPad
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5W3QDZ94FH          # Casper's Apple Developer Team (not secret)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # Live Activity widget extension (lock screen / Dynamic Island now-playing).
  # Dependency-free: only the shared ActivityAttributes file + WidgetKit/SwiftUI.
  RoonSageWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    entitlements:
      path: Widgets/RoonSageWidgets.entitlements
      properties:
        com.apple.security.application-groups: [group.com.roonsage.ios]
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: RoonSage Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roonsage.ios.widgets
        PRODUCT_NAME: RoonSageWidgets
        # Onderscheidt de widget-compilatie van de app: de gedeelde intents
        # importeren RoonSageCore alleen buiten de extensie.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) WIDGET_EXTENSION"
        MARKETING_VERSION: "1.6.2"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5W3QDZ94FH
        SKIP_INSTALL: YES
