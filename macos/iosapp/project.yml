# xcodegen spec for the RoonSage iOS app.
# Regenerate the .xcodeproj after editing:  cd macos/iosapp && xcodegen generate
# The app target reuses the shared SPM package at ../RoonSage (RoonSageUI +
# RoonSageCore); no app source is duplicated.
name: RoonSageiOS
options:
  bundleIdPrefix: com.roonsage
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  RoonSage:
    path: ../RoonSage

targets:
  RoonSageiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    dependencies:
      - package: RoonSage
        product: RoonSageUI
      - package: RoonSage
        product: RoonSageCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roonsage.ios
        PRODUCT_NAME: RoonSage
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"          # iPhone + iPad
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5W3QDZ94FH          # Casper's Apple Developer Team (not secret)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # --- Synthesized Info.plist keys ---
        INFOPLIST_KEY_CFBundleDisplayName: RoonSage
        # iOS requires a local-network usage string to reach the Roon Core
        # (direct TCP to the saved host, incl. over ZeroTier).
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "RoonSage verbindt met je Roon Core op het lokale netwerk om je muziek te bedienen."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Standard HTTPS-only encryption → exempt from US export compliance review.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
