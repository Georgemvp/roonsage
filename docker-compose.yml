services:
  roonsage:
    # image: ghcr.io/georgemvp/roonsage:latest
    # To build locally instead, comment out 'image' and uncomment 'build':
    build: .
    container_name: roonsage
    # Optional: Run as specific user for NAS/Synology (use your PUID:PGID)
    # user: "1000:1000"
    ports:
      - "5765:5765"
    environment:
      # Roon Core settings
      # ROON_HOST, ROON_TOKEN and ROON_CORE_ID are intentionally omitted here.
      # They are saved to data/config.user.yaml via the Settings UI and loaded
      # from there on every restart. Setting them as env vars would override
      # UI-saved values on every restart. Uncomment only if you prefer env vars:
      #- ROON_HOST=192.168.1.x
      - ROON_PORT=9330

      # Performance tuning
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}

      # Enrichment: skip MusicBrainz, use Last.fm only (~50× faster for large libraries)
      - ENRICHMENT_SKIP_MB=true

      # Audio feature analysis (BPM, key, energy) — see backend/audio_features/
      # Set AUDIO_FEATURES_ENABLED=true and mount your music library below.
      - AUDIO_FEATURES_ENABLED=${AUDIO_FEATURES_ENABLED:-false}
      # Filesystem path inside the container where your music library lives.
      - MUSIC_LIBRARY_PATH=${MUSIC_LIBRARY_PATH:-/music}
      # Optional: map a Roon-side path prefix to the container path (handy for NAS).
      # Example: Roon reports "/Volumes/Music/Artist/..." → inside container at "/music/Artist/..."
      - MUSIC_PATH_MAP_FROM=${MUSIC_PATH_MAP_FROM:-}
      - MUSIC_PATH_MAP_TO=${MUSIC_PATH_MAP_TO:-}

      # LLM Provider (anthropic, openai, gemini, ollama, or custom)
      # Defaults to gemini. Can also be configured in the web UI.
      #- LLM_PROVIDER=gemini

      # Cloud provider API keys (set one)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # Optional: Override default models
      #- LLM_MODEL_ANALYSIS=gemini-2.5-flash
      #- LLM_MODEL_GENERATION=gemini-2.5-flash

      # Local LLM: Ollama (experimental)
      #- LLM_PROVIDER=ollama
      #- OLLAMA_URL=http://host.docker.internal:11434
      #- OLLAMA_CONTEXT_WINDOW=32768

      # Local LLM: Custom OpenAI-compatible API (experimental)
      #- LLM_PROVIDER=custom
      #- CUSTOM_LLM_URL=https://openrouter.ai/api/v1
      #- CUSTOM_LLM_API_KEY=sk-or-your-key
      #- CUSTOM_CONTEXT_WINDOW=32768
    volumes:
      # Persist library cache across restarts
      # Ensure directory is writable: either set 'user' above, or run:
      #   mkdir -p ./data && chmod 777 ./data
      - ./data:/app/data
      # Live-reload frontend without rebuilding the container
      - ./frontend:/app/frontend
      # Live-reload backend without rebuilding the container
      - ./backend:/app/backend
      # Optional: persist UI settings
      # - ./config.user.yaml:/app/config.user.yaml
      # Music library mount (read-only) for the audio_features worker.
      # Uncomment and adjust the host path to enable BPM / key / energy analysis.
      # - /Volumes/Music:/music:ro
    restart: unless-stopped
    stop_grace_period: 60s
