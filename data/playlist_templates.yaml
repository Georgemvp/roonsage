  - id: deep-focus
    name: Deep Focus
    description: Minimal electronic and ambient for concentration and flow state
    icon: "🎯"
    category: Activities
    prompt: >
      A deep focus playlist for concentration and flow state. Minimal electronic,
      ambient, and post-rock. Prefer instrumental tracks or tracks with minimal
      vocals that don't distract. Consistent tempo and texture, no sudden changes.
      30 tracks that help the brain lock in for hours of focused work.
    filters:
      genres: []
      decades: []
      exclude_live: true
    track_count: 30

  - id: workout-energy
    name: Workout Energy
    description: High-energy rock, electronic, and hip-hop to power your training
