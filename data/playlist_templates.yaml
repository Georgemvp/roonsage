  # ===========================================================================
  # Eras
  # ===========================================================================
  - id: 90s-nostalgia
    name: 90s Nostalgia
    description: Alternative rock, grunge, and britpop from the nineties
    icon: "📼"
    category: Eras
    prompt: >
      A 90s nostalgia playlist full of alternative rock, grunge, and britpop from
      the 1990s. Guitar-driven, angsty but catchy, with that distinct lo-fi warmth
      of the decade. Mix of big hits and underrated deep cuts. 30 tracks that take
      you straight back to the era of flannel shirts and mixtapes.
    filters:
      genres: []
      decades: ["1990s"]
      exclude_live: true
    track_count: 30

  - id: 50s-rock-roll
    name: 50s Rock & Roll
    description: The birth of rock — raw, rhythmic, and electric
    icon: "🎸"
    category: Eras
    prompt: >
      A 1950s rock and roll playlist that captures the birth of rock. Chuck
      Berry-style guitar shuffles, doo-wop harmonies, early rockabilly, and
      raw rhythm and blues. Energetic, dance-ready, dripping with reverb and
      tape hiss. 25 tracks from the decade that invented the form.
    filters:
      genres: []
      decades: ["1950s"]
      exclude_live: true
    track_count: 25

  - id: 60s-psychedelic
    name: 60s Psychedelic
    description: Trippy guitars, sitars, and mind-bending sixties studio magic
    icon: "🌀"
    category: Eras
    prompt: >
      A 1960s psychedelic playlist. Trippy guitars, sitars, swirling organs,
      and mind-bending studio production. British psych, San Francisco acid
      rock, garage psych obscurities. Lush, kaleidoscopic, slightly chaotic.
      25 tracks that capture the decade's experimental peak.
    filters:
      genres: []
      decades: ["1960s"]
      exclude_live: true
    track_count: 25

  - id: 70s-soul-funk
    name: 70s Soul & Funk
    description: Deep grooves, lush strings, and Philly soul classics
