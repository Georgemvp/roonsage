      genres: []
      decades: ["2000s"]
      exclude_live: true
    track_count: 30

  - id: 2010s-pop
    name: 2010s Pop
    description: Big choruses, modern production, and the streaming era
    icon: "📱"
    category: Eras
    prompt: >
      A 2010s pop playlist. Big choruses, modern hybrid production, EDM-pop
