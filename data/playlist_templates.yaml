  - id: bittersweet
    name: Bittersweet
    description: Songs that hold joy and sadness in the same breath
    icon: "🍯"
    category: Mood
    prompt: >
      A bittersweet playlist — songs that mix joy and sadness in the same breath.
      Major-key heartbreakers, hopeful melancholy, indie songs with smiling but
