templates:
  # ===========================================================================
  # Mood
  # ===========================================================================
  - id: friday-night-chill
    name: Friday Night Chill
    description: Melancholic but warm, perfect for winding down the week
    icon: "🌙"
    category: Mood
    prompt: >
      A melancholic but warm playlist for a Friday evening. Mix of electronic,
      ambient, and jazz with introspective lyrics. Think late-night city vibes,
      soft synths, muted horns. Emotional but not heavy. 25 tracks that feel
      like the end of a long week turning into something peaceful.
    filters:
      genres: []
      decades: []
      exclude_live: true
    track_count: 25

  - id: sunday-morning
    name: Sunday Morning
    description: Calm acoustic folk and singer-songwriter for an easy morning
    icon: "☀️"
    category: Mood
    prompt: >
      A calm, unhurried Sunday morning playlist. Acoustic guitar, gentle vocals,
      folk and singer-songwriter tracks that feel like sunlight through curtains.
      Warm, intimate recordings — think coffee, quiet, no rush. 20 tracks with
      a soft, reflective mood.
    filters:
      genres: []
      decades: []
      exclude_live: true
    track_count: 20

  - id: rainy-day
    name: Rainy Day
    description: Atmospheric shoegaze, dream pop, and post-rock for grey skies
    icon: "🌧️"
    category: Mood
    prompt: >
      A rainy day playlist steeped in atmosphere. Shoegaze, dream pop, and post-rock
