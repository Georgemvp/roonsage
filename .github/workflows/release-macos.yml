name: Release macOS DMG

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '0.0.0-test'

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-14
    timeout-minutes: 60
    env:
      # Exposed at job level so the "Import signing certificate" step's `if:`
      # can detect whether signing secrets are configured.
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # Imports the Developer ID cert into a temporary keychain and auto-detects
      # the signing identity — only runs when the APPLE_CERTIFICATE secret is
      # present; otherwise the build falls back to ad-hoc signing (no
      # notarization). See macos/SIGNING.md.
      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain >/dev/null
          security list-keychains -d user -s build.keychain login.keychain-db
          rm /tmp/cert.p12

          echo "── All code-signing identities in the keychain (need a private key):"
          security find-identity -v -p codesigning build.keychain || true
          echo "── All identities (any policy):"
          security find-identity -v build.keychain || true

          # Derive the "Developer ID Application: … (TEAMID)" identity from the keychain.
          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed -E 's/^[^"]*"(.*)"$/\1/')
          if [[ -z "$IDENTITY" ]]; then
            echo "::error::No 'Developer ID Application' identity found. The dump above shows what's in APPLE_CERTIFICATE."
            echo "::error::You need a *Developer ID Application* cert exported as .p12 WITH its private key. See macos/SIGNING.md."
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build release DMG
        env:
          # SIGN_IDENTITY is auto-derived above (via $GITHUB_ENV) when signing.
          # When unset the script ad-hoc signs (unchanged behaviour).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd macos
          mkdir -p build
          ./scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Verify app bundle
        run: |
          DMG="macos/build/RoonSage-${{ steps.version.outputs.version }}.dmg"
          hdiutil attach "$DMG" -mountpoint /tmp/roonsage-verify -quiet
          codesign --verify --deep --verbose /tmp/roonsage-verify/RoonSage.app
          # If notarized, confirm the staple too (non-fatal when ad-hoc).
          xcrun stapler validate /tmp/roonsage-verify/RoonSage.app || echo "not stapled (ad-hoc build)"
          echo "App bundle OK"
          hdiutil detach /tmp/roonsage-verify -quiet

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="macos/build/RoonSage-${VERSION}.dmg"

          cat > /tmp/release-notes.md << 'NOTES'
          Native macOS client for Roon — browse, control playback and sync your library locally.

          ### Install
          1. Download the DMG and drag **RoonSage** to Applications
          2. First launch: right-click → Open (required once for unsigned apps)
          3. RoonSage discovers your Roon Core automatically
          4. Approve in Roon → Settings → Extensions

          ### Requirements
          - macOS 14 Sonoma or later
          - Roon running on the same local network
          NOTES

          gh release create "v${VERSION}" \
            --title "RoonSage v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "$DMG"

      - name: Upload DMG artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RoonSage-${{ steps.version.outputs.version }}-dmg
          path: macos/build/RoonSage-${{ steps.version.outputs.version }}.dmg
          retention-days: 7
