name: Release macOS DMG

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '0.0.0-test'

# Required to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build-dmg:
    name: Build, Sign & Notarize DMG
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Import certificate
        id: cert
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -f pkcs12

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          KEYCHAINS=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $KEYCHAINS

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 \
            | sed -E 's/.*"(.+)"/\1/')

          if [[ -z "$IDENTITY" ]]; then
            echo "ERROR: No Developer ID Application certificate found"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "sign_identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "Found identity: $IDENTITY"

      - name: Build release DMG
        env:
          SIGN_IDENTITY: ${{ steps.cert.outputs.sign_identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd macos
          mkdir -p build
          ./scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Verify app signature
        run: |
          DMG="macos/build/RoonSage-${{ steps.version.outputs.version }}.dmg"
          hdiutil attach "$DMG" -mountpoint /tmp/roonsage-verify -quiet
          codesign --verify --deep --verbose /tmp/roonsage-verify/RoonSage.app
          spctl --assess --verbose=4 /tmp/roonsage-verify/RoonSage.app || true
          hdiutil detach /tmp/roonsage-verify -quiet

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="macos/build/RoonSage-${VERSION}.dmg"

          gh release create "v${VERSION}" \
            --title "RoonSage v${VERSION}" \
            --notes "## RoonSage v${VERSION}

Native macOS client for Roon.

### Install
1. Download \`RoonSage-${VERSION}.dmg\`
2. Open the DMG and drag RoonSage to Applications
3. Launch — RoonSage discovers your Roon Core automatically
4. Approve in Roon → Settings → Extensions

### Requirements
- macOS 14 Sonoma or later
- Roon running on the same local network" \
            "$DMG"

      - name: Upload DMG as artifact (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RoonSage-${{ steps.version.outputs.version }}-dmg
          path: macos/build/RoonSage-${{ steps.version.outputs.version }}.dmg
          retention-days: 7

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain" 2>/dev/null || true
