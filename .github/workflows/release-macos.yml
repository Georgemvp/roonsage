name: Release macOS DMG

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '0.0.0-test'

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build release DMG (ad-hoc signed)
        run: |
          cd macos
          mkdir -p build
          # SIGN_IDENTITY not set → build-release.sh uses ad-hoc signing automatically
          ./scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Verify app bundle
        run: |
          DMG="macos/build/RoonSage-${{ steps.version.outputs.version }}.dmg"
          hdiutil attach "$DMG" -mountpoint /tmp/roonsage-verify -quiet
          codesign --verify --deep --verbose /tmp/roonsage-verify/RoonSage.app
          echo "App bundle OK"
          hdiutil detach /tmp/roonsage-verify -quiet

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="macos/build/RoonSage-${VERSION}.dmg"

          cat > /tmp/release-notes.md << 'NOTES'
          Native macOS client for Roon — browse, control playback and sync your library locally.

          ### Install
          1. Download the DMG and drag **RoonSage** to Applications
          2. First launch: right-click → Open (required once for unsigned apps)
          3. RoonSage discovers your Roon Core automatically
          4. Approve in Roon → Settings → Extensions

          ### Requirements
          - macOS 14 Sonoma or later
          - Roon running on the same local network
          NOTES

          gh release create "v${VERSION}" \
            --title "RoonSage v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "$DMG"

      - name: Upload DMG artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RoonSage-${{ steps.version.outputs.version }}-dmg
          path: macos/build/RoonSage-${{ steps.version.outputs.version }}.dmg
          retention-days: 7
