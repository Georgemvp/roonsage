name: Release macOS DMG

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '0.0.0-test'

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-14
    timeout-minutes: 30
    env:
      # Exposed at job level so the "Import signing certificate" step's `if:`
      # can detect whether signing secrets are configured.
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # Imports the Developer ID cert into a temporary keychain — only runs when
      # the MACOS_CERT_P12 secret is present; otherwise the build falls back to
      # ad-hoc signing (no notarization). See macos/SIGNING.md.
      - name: Import signing certificate
        if: env.MACOS_CERT_P12 != ''
        env:
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain >/dev/null
          security list-keychains -d user -s build.keychain login.keychain-db
          rm /tmp/cert.p12

      - name: Build release DMG
        env:
          # When these secrets exist the script signs with Developer ID + notarizes;
          # when they're empty it ad-hoc signs (unchanged behaviour).
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd macos
          mkdir -p build
          ./scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Verify app bundle
        run: |
          DMG="macos/build/RoonSage-${{ steps.version.outputs.version }}.dmg"
          hdiutil attach "$DMG" -mountpoint /tmp/roonsage-verify -quiet
          codesign --verify --deep --verbose /tmp/roonsage-verify/RoonSage.app
          # If notarized, confirm the staple too (non-fatal when ad-hoc).
          xcrun stapler validate /tmp/roonsage-verify/RoonSage.app || echo "not stapled (ad-hoc build)"
          echo "App bundle OK"
          hdiutil detach /tmp/roonsage-verify -quiet

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="macos/build/RoonSage-${VERSION}.dmg"

          cat > /tmp/release-notes.md << 'NOTES'
          Native macOS client for Roon — browse, control playback and sync your library locally.

          ### Install
          1. Download the DMG and drag **RoonSage** to Applications
          2. First launch: right-click → Open (required once for unsigned apps)
          3. RoonSage discovers your Roon Core automatically
          4. Approve in Roon → Settings → Extensions

          ### Requirements
          - macOS 14 Sonoma or later
          - Roon running on the same local network
          NOTES

          gh release create "v${VERSION}" \
            --title "RoonSage v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "$DMG"

      - name: Upload DMG artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RoonSage-${{ steps.version.outputs.version }}-dmg
          path: macos/build/RoonSage-${{ steps.version.outputs.version }}.dmg
          retention-days: 7
