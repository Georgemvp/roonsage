name: Legacy Docker/Python Tests

# DEPRECATED STACK — the Docker/FastAPI web app lives under legacy-docker/ and
# is no longer the primary product (the native macOS/iOS apps are; see
# native-tests.yml). This job only runs when something under legacy-docker/
# actually changes, so native-only commits don't trigger the Python suite.
#
# NOTE: `paths` filters are ignored for tag pushes, so without the explicit
# `branches:` restriction below this deprecated suite ran (and failed) on every
# release tag (v*, ios-v*, analyzer-v*), painting the repo's status red even
# though the native tests were green. Restricting push to `main` excludes tags.

on:
  push:
    branches:
      - main
    paths:
      - 'legacy-docker/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'legacy-docker/**'
      - '.github/workflows/test.yml'

concurrency:
  group: legacy-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Legacy pytest + ruff (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy-docker
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=backend --cov-report=term-missing --cov-fail-under=40
