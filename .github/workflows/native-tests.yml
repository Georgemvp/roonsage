name: Native Tests (macOS/iOS)

# PRIMARY CI for the native Swift apps under native/. Runs the SPM test suites
# for the shared packages and a release-build sanity check (CI is stricter than
# a local debug build). Path-filtered so legacy-docker/** changes don't trigger
# it — those run the deprecated Python suite in test.yml instead.
#
# Restricted to `main` (+ PRs) on purpose: tags are cut from the same commit
# already pushed to main, and `paths` filters don't apply to tag pushes — so
# without this every release would re-run these tests once per tag (v*, ios-v*,
# analyzer-v*) on top of the main run, i.e. 4× the same suite on one commit.
# The release workflows still do their own `swift build -c release`.

on:
  push:
    branches:
      - main
    paths:
      - 'native/**'
      - '.github/workflows/native-tests.yml'
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/native-tests.yml'

concurrency:
  group: native-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      # Phase 1 — report-only: `--lenient` downgrades every violation to a
      # warning so the job stays green while surfacing all findings as PR
      # annotations. Once the existing violations are driven to zero, drop
      # `--lenient` (and optionally add `--strict`) to turn this into a hard gate.
      - name: Lint
        run: swiftlint lint --config .swiftlint.yml --lenient

  test:
    name: swift test + release build
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache resolved SPM deps + the build so GRDB isn't re-fetched/recompiled
      # from scratch every run. Keyed on the committed Package.resolved.
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            native/RoonSage/.build
            native/RoonProtocol/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('native/RoonSage/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: RoonProtocol — swift test
        run: cd native/RoonProtocol && swift test

      - name: RoonSage — swift test
        run: cd native/RoonSage && swift test

      # Mirrors the release pipeline: debug `swift test` passes but the release
      # configuration is stricter and has caught build-only failures before.
      - name: RoonSage — release build sanity (shared targets)
        run: cd native/RoonSage && swift build -c release --product RoonSage

  # Builds the SHIPPABLE artifacts (iOS archive + the macOS/analyzer .app
  # bundles) without uploading, so packaging breaks — xcodegen, Info.plist
  # stamping, entitlements, asset catalogs, iOS signing config — surface on PRs
  # instead of only at release-tag time.
  build-apps:
    name: build apps (no upload)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            native/RoonSage/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-build-${{ runner.os }}-${{ hashFiles('native/RoonSage/Package.resolved') }}
          restore-keys: spm-build-${{ runner.os }}-

      # Build every shippable executable in release mode. The test job only
      # builds RoonSage; the analyzer app/CLI and MCP server were never built on
      # PRs and could break unnoticed until their release tag.
      - name: macOS release products
        run: |
          cd native/RoonSage
          swift build -c release \
            --product RoonSage \
            --product RoonSageAnalyzerApp \
            --product roonsage-analyzer \
            --product roonsage-mcp

      - name: Install xcodegen
        run: brew install xcodegen

      # xcodegen must succeed (validates project.yml — a hard gate).
      - name: iOS project (xcodegen)
        run: cd native/iosapp && xcodegen generate

      # The simulator compile is best-effort: GitHub runners are flaky about
      # simulator-destination resolution (exit 74), so a runner quirk shouldn't
      # hold main red. The macOS release-products step above is the reliable
      # compile gate; this adds iOS coverage when the runner cooperates.
      - name: iOS app (simulator build, no signing)
        continue-on-error: true
        run: |
          cd native/iosapp
          xcodebuild -project RoonSageiOS.xcodeproj -scheme RoonSageiOS \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -configuration Debug build CODE_SIGNING_ALLOWED=NO
