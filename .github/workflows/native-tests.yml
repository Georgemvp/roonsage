name: Native Tests (macOS/iOS)

# PRIMARY CI for the native Swift apps under native/. Runs the SPM test suites
# for the shared packages and a release-build sanity check (CI is stricter than
# a local debug build). Path-filtered so legacy-docker/** changes don't trigger
# it — those run the deprecated Python suite in test.yml instead.
#
# Restricted to `main` (+ PRs) on purpose: tags are cut from the same commit
# already pushed to main, and `paths` filters don't apply to tag pushes — so
# without this every release would re-run these tests once per tag (v*, ios-v*,
# analyzer-v*) on top of the main run, i.e. 4× the same suite on one commit.
# The release workflows still do their own `swift build -c release`.

on:
  push:
    branches:
      - main
    paths:
      - 'native/**'
      - '.github/workflows/native-tests.yml'
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/native-tests.yml'

concurrency:
  group: native-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test + release build
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: RoonProtocol — swift test
        run: cd native/RoonProtocol && swift test

      - name: RoonSage — swift test
        run: cd native/RoonSage && swift test

      # Mirrors the release pipeline: debug `swift test` passes but the release
      # configuration is stricter and has caught build-only failures before.
      - name: RoonSage — release build sanity (shared targets)
        run: cd native/RoonSage && swift build -c release --product RoonSage
