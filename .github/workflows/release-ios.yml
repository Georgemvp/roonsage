name: Release iOS TestFlight

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '0.0.1'

permissions:
  contents: read

jobs:
  build-ipa:
    name: Build & Upload to TestFlight
    runs-on: [self-hosted, macOS, xcode-26]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          BUILD=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION  Build: $BUILD"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd macos/iosapp && xcodegen generate

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_CONTENT" | base64 --decode > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Unlock login keychain for code signing
        env:
          RUNNER_KEYCHAIN_PASSWORD: ${{ secrets.RUNNER_KEYCHAIN_PASSWORD }}
        run: |
          # Self-hosted runner: the login keychain is locked for background launchd services.
          # Unlock it so codesign can access/create the Distribution private key.
          security unlock-keychain -p "$RUNNER_KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_KEYCHAIN_PASSWORD" \
            ~/Library/Keychains/login.keychain-db >/dev/null 2>&1 || true
          security list-keychains -s ~/Library/Keychains/login.keychain-db

      - name: Build archive
        run: |
          cd macos/iosapp
          xcodebuild archive \
            -scheme RoonSageiOS \
            -destination 'generic/platform=iOS' \
            -archivePath build/RoonSage.xcarchive \
            DEVELOPMENT_TEAM=5W3QDZ94FH \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_KEY_ISSUER_ID }}"

      - name: Export & Upload to TestFlight
        run: |
          # destination=upload tells xcodebuild to push directly to App Store
          # Connect after export — no separate iTMSTransporter step needed.
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>5W3QDZ94FH</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          cd macos/iosapp
          xcodebuild -exportArchive \
            -archivePath build/RoonSage.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_KEY_ISSUER_ID }}"

      - name: Upload IPA artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RoonSage-${{ steps.version.outputs.version }}-ipa
          path: macos/iosapp/build/export/RoonSageiOS.ipa
          retention-days: 7
