# RoonSage Configuration
# Copy this file to config.yaml and update with your settings
# Environment variables take priority over values in this file

roon:
  # Roon Core host/IP address (override with ROON_HOST env var)
  host: "192.168.1.x"
  # Roon Core port (override with ROON_PORT env var, default 9330)
  port: 9330
  # Core ID and token are auto-saved after first authorization
  # in Roon → Settings → Extensions → Enable RoonSage
  core_id: ""
  token: ""
  # Extension metadata shown in Roon
  extension_id: "com.roonsage.roon"
  display_name: "RoonSage"
  display_version: "1.0.0"

llm:
  # LLM provider: "anthropic", "openai", or "gemini"
  provider: "gemini"
  # API key (override with ANTHROPIC_API_KEY, OPENAI_API_KEY, or GEMINI_API_KEY env var)
  api_key: ""
  # Model for analysis (understanding prompts, extracting dimensions)
  # Defaults: gemini-2.5-flash (Gemini), claude-sonnet-4-5-latest (Anthropic), gpt-4.1 (OpenAI)
  # model_analysis: "gemini-2.5-flash"
  # Model for generation (selecting tracks from list)
  # Defaults: gemini-2.5-flash (Gemini), claude-haiku-4-5-latest (Anthropic), gpt-4.1-mini (OpenAI)
  # model_generation: "gemini-2.5-flash"
  # Use the analysis model for generation too (higher quality, ~3-5x cost)
  smart_generation: false

defaults:
  # Default number of tracks in generated playlists (15, 25, or 40)
  track_count: 25

notifications:
  # Discord webhook URL (override with DISCORD_WEBHOOK_URL env var)
  # Create a webhook in Discord: Server Settings → Integrations → Webhooks
  discord_webhook_url: ""

  # Telegram bot token + chat ID (override with TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID env vars)
  # Create a bot via @BotFather, then get your chat ID from @userinfobot
  telegram_bot_token: ""
  telegram_chat_id: ""

  # Generic webhook: any HTTP endpoint that accepts POST JSON
  # (override with WEBHOOK_URL env var)
  webhook_url: ""

acoustid:
  # AcoustID API key — free, register at https://acoustid.org/api-key
  # Used to verify that Qobuz search results match the intended track
  # (catches wrong versions: live vs. studio, remix vs. original, etc.)
  # Override with ACOUSTID_API_KEY env var
  api_key: ""
  # Enable AcoustID verification (requires api_key)
  enabled: false
  # Automatically verify every Qobuz search result (adds minor latency)
  auto_verify_qobuz: false

lastfm:
  # Last.fm API key and shared secret (from https://www.last.fm/api/account/create)
  # Override with LASTFM_API_KEY / LASTFM_API_SECRET env vars
  api_key: ""
  api_secret: ""
  # Session key is auto-saved after authentication — do not set manually
  session_key: ""
  # Last.fm username (optional — used for top artists/tracks stats)
  username: ""

  # Which events trigger notifications.
  # Available: playlist_generated, library_sync_complete, library_sync_failed,
  #            lb_sync_complete, new_release_found, listening_milestone
  enabled_events:
    - playlist_generated
    - library_sync_complete
